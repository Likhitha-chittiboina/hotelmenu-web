<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Menu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#ff6b00;
color:white;
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
}

nav{
background:#222;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:20px;
font-size:18px;
}

.hero{
background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200") center/cover;
height:300px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:45px;
font-weight:bold;
}

.menu{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
padding:40px;
}

.card{
width:250px;
background:white;
border-radius:15px;
box-shadow:0 0 10px gray;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h2{
text-align:center;
margin-top:10px;
}

.price{
text-align:center;
font-size:28px;
color:red;
font-weight:bold;
margin:10px;
}

button{
display:block;
margin:20px auto;
padding:10px 25px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

button:hover{
background:darkgreen;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
font-size:20px;
margin-top:30px;
}

</style>

</head>

<body>

<header>
🍽 Welcome To Hotel Menu 🍽
</header>

<nav>
<a href="#">Home</a>
<a href="#">Menu</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
Delicious Food Served Fresh
</div>

<div class="menu">

<div class="card">
<img src="{{ url_for('static', filename='images/idli.jpg') }}" alt="Idli">
<h2>Idli</h2>
<p class="price">₹30</p>
<button onclick="alert('Idli Ordered Successfully')">Order Now</button>
</div>

<div class="card">
<img src="{{ url_for('static', filename='images/dosa.jpg') }}" alt="Dosa">
<h2>Dosa</h2>
<p class="price">₹50</p>
<button onclick="alert('Dosa Ordered Successfully')">Order Now</button>
</div>

<div class="card">
<img src="{{ url_for('static', filename='images/biryani.jpg') }}" alt="Biryani">
<h2>Biryani</h2>
<p class="price">₹150</p>
<button onclick="alert('Biryani Ordered Successfully')">Order Now</button>
</div>

<div class="card">
<img src="{{ url_for('static', filename='images/tea.jpg') }}" alt="Tea">
<h2>Tea</h2>
<p class="price">₹20</p>
<button onclick="alert('Tea Ordered Successfully')">Order Now</button>
</div>

</div>

<footer>
📍 Bangalore | 📞 +91 9876543210 | 📧 hotelmenu@gmail.com
<br><br>
😊 Thank You! Visit Again 😊
</footer>

</body>
</html>
