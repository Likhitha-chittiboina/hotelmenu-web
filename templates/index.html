<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Menu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#222;
    color:white;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-size:18px;
}

.hero{
    background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1400") no-repeat center;
    background-size:cover;
    height:350px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero h1{
    color:white;
    font-size:50px;
    background:rgba(0,0,0,.5);
    padding:15px 30px;
    border-radius:10px;
}

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:40px;
}

.card{
    width:250px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h2{
    margin:15px 0;
}

.price{
    color:#d35400;
    font-size:28px;
    font-weight:bold;
}

button{
    margin:15px;
    padding:10px 25px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    font-size:22px;
}
</style>

</head>

<body>

<header>
<nav>
<a href="#">Home</a>
<a href="#">Menu</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<div class="hero">
<h1>🍽 Delicious Food Served Fresh 🍽</h1>
</div>

<div class="menu">

<div class="card">
<img src="{{ url_for('static', filename='images/idli.jpg') }}">
<h2>Idli</h2>
<p class="price">₹30</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="{{ url_for('static', filename='images/dosa.jpg') }}">
<h2>Dosa</h2>
<p class="price">₹50</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="{{ url_for('static', filename='images/biryani.jpg') }}">
<h2>Biryani</h2>
<p class="price">₹150</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="{{ url_for('static', filename='images/tea.jpg') }}">
<h2>Tea</h2>
<p class="price">₹20</p>
<button>Order Now</button>
</div>

</div>

<footer>
😊 Thank You! Visit Again 😊
</footer>

</body>
</html>
