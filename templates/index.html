<!DOCTYPE html>
<html>
<head>
    <title>Hotel Menu</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f2f2f2;
        }

        .container{
            width:90%;
            margin:auto;
            text-align:center;
        }

        h1{
            background:#ff6600;
            color:white;
            padding:20px;
        }

        .menu{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
            margin-top:30px;
        }

        .card{
            background:white;
            width:220px;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        .card img{
            width:100%;
            height:150px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            color:red;
            font-size:22px;
            font-weight:bold;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        footer{
            margin-top:30px;
            background:#222;
            color:white;
            padding:20px;
        }
    </style>

</head>

<body>

<div class="container">

<h1>🍽 Welcome to Hotel Menu 🍽</h1>

<div class="menu">

<div class="card">
<img src="https://picsum.photos/300/200?random=1" alt="Idli">
<h2>Idli</h2>
<p class="price">₹30</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?random=2" alt="Dosa">
<h2>Dosa</h2>
<p class="price">₹50</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?random=3" alt="Biryani">
<h2>Biryani</h2>
<p class="price">₹150</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?random=4" alt="Tea">
<h2>Tea</h2>
<p class="price">₹20</p>
<button>Order Now</button>
</div>

</div>

<footer>
<h3>😊 Thank You! Visit Again 😊</h3>
</footer>

</div>

</body>
</html>
