<!DOCTYPE html>
<html>
<head>
    <title>Hotel Menu</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f2f2f2;
        }

        h1{
            background:#ff6600;
            color:white;
            text-align:center;
            padding:20px;
        }

        .menu{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            padding:30px;
        }

        .card{
            width:250px;
            background:white;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
            text-align:center;
            padding:15px;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:10px;
        }

        .card h2{
            margin:15px 0 10px;
        }

        .price{
            color:red;
            font-size:22px;
            font-weight:bold;
            margin-bottom:15px;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:20px;
            font-size:20px;
        }
    </style>

</head>

<body>

<h1>🍽 Welcome to Hotel Menu 🍽</h1>

<div class="menu">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Idli_Sambar.JPG" alt="Idli">
<h2>Idli</h2>
<p class="price">₹30</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Masala_Dosa.jpg" alt="Dosa">
<h2>Dosa</h2>
<p class="price">₹50</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Hyderabadi_Chicken_Biryani.jpg" alt="Biryani">
<h2>Biryani</h2>
<p class="price">₹150</p>
<button>Order Now</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Tea.jpg" alt="Tea">
<h2>Tea</h2>
<p class="price">₹20</p>
<button>Order Now</button>
</div>

</div>

<footer>
😊 Thank You! Visit Again 😊
</footer>

</body>
